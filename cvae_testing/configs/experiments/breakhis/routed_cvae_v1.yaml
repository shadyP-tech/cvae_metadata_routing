seed: 42

experiment:
  dataset_name: breakhis
  name: routed_cvae_v1

data:
  root: data/BreakHis
  image_extensions: [".png", ".jpg", ".jpeg", ".tif", ".tiff", ".bmp"]
  magnifications: [40, 100, 200, 400]
  max_samples_per_domain: 500
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  require_patient_ids: false

features:
  image_size: 64
  embedding_dim: 512

model:
  hidden_dim: 256
  latent_dim: 16

training:
  batch_size: 128
  learning_rate: 0.001
  epochs: 25
  patience: 5

routing:
  strategy: ordinal_magnification
  tau: 100.0
  temperature: 1.0

output:
  root: outputs
