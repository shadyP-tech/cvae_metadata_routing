seed: 42

experiment:
  dataset_name: camelyon17
  name: hybrid_ablation_smoke_v1
  mode: hybrid_ablation

data:
  dataset_type: camelyon17
  root: data/Camelyon17/data/camelyon17_v1.0
  metadata_file: metadata.csv
  domain_field: center
  use_metadata_split: false
  image_extensions: [".png", ".jpg", ".jpeg", ".tif", ".tiff", ".bmp"]
  magnifications: [0, 1, 2, 3, 4]
  max_samples_per_domain: 50
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  require_patient_ids: true

features:
  image_size: 64
  embedding_dim: 512

model:
  hidden_dim: 128
  latent_dim: 8

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 3
  patience: 1

routing:
  strategy: categorical_exact
  tau: 1.0
  temperature: 1.0

hybrid:
  projection_dim: 64
  head_hidden_dim: 64
  cvae_hidden_dim: 128
  variants: ["A"]
  synthetic_budgets: [1.0, 0.5]

output:
  root: outputs

tracking:
  enabled: true
  backend: wandb
  project: cvae-testing-smoke
  tags: ["smoke", "camelyon17", "hybrid_ablation"]
