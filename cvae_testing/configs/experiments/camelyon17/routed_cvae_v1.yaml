seed: 42

experiment:
  dataset_name: camelyon17
  name: routed_cvae_v1

data:
  dataset_type: camelyon17
  root: data/Camelyon17/data/camelyon17_v1.0
  metadata_file: metadata.csv
  domain_field: center
  use_metadata_split: false
  image_extensions: [".png", ".jpg", ".jpeg", ".tif", ".tiff", ".bmp"]
  magnifications: [0, 1, 2, 3, 4]
  max_samples_per_domain: 500
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  require_patient_ids: true

features:
  image_size: 64
  embedding_dim: 512

model:
  hidden_dim: 256
  latent_dim: 16

training:
  batch_size: 128
  learning_rate: 0.001
  epochs: 25
  patience: 5

routing:
  strategy: categorical_exact
  tau: 1.0
  temperature: 1.0

output:
  root: outputs
